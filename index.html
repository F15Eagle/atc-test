<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkyNode ATC | Terminal Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <div class="header">
                <h1>SKYNODE <span class="v">v2.0</span></h1>
                <p id="clock">12:00:00</p>
            </div>
            
            <div id="strip-container">
                <h3>Flight Strips</h3>
                <div id="strips"></div>
            </div>

            <div id="comms">
                <h3>Radio Log</h3>
                <div id="log-content"></div>
            </div>
        </div>

        <div id="main-view">
            <canvas id="gameCanvas"></canvas>
            <div id="command-bar" class="hidden">
                <div id="plane-header">--</div>
                <div class="btn-group">
                    <button onclick="cmd('CLEARED_LAND')">Clear Land</button>
                    <button onclick="cmd('HOLD_SHORT')">Hold Short</button>
                    <button onclick="cmd('LINE_UP')">Line Up</button>
                    <button onclick="cmd('TAKEOFF')">Takeoff</button>
                    <button onclick="cmd('TAXI_GATE')">Taxi Gate</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
